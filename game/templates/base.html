<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>{% block title %}AI 可视化算法学习平台{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2>算法目录</h2>
      <nav>
        <ul style="padding-left:0; list-style:none; margin:0;">
          {% for algo in algos %}
            <li>
              <a href="{{ algo.path }}" {% if algo.id == active_algo %}class="active"{% endif %}>{{ algo.name }}</a>
            </li>
          {% endfor %}
        </ul>
      </nav>

      <hr style="border:none;border-top:1px solid rgba(255,255,255,0.06); margin:16px 0">

      <div class="small">全局进度</div>
      <div style="margin-top:8px">
        <div class="progress" style="width:100%"><div class="progress-inner"></div></div>
        <div class="small" id="progress-percent">0%</div>
      </div>
    </div>

    <div class="main">
      <div class="left-panel">
        {% block left_panel %}{% endblock %}
      </div>
      <div class="right-panel card">
        {% block right_panel %}
          <h3>你的信息</h3>
          <div style="margin-top:8px">积分： <span id="score-display" class="score">0</span></div>
          <div style="margin-top:12px"><strong>徽章</strong>
            <div id="badges-list" style="margin-top:8px"></div>
          </div>
          <div style="margin-top:12px">
            <button class="btn" onclick="exportLogs()">导出日志</button>
          </div>
        {% endblock %}
      </div>
    </div>
  </div>

  <script>
    // 将后端算法列表注入前端，供进度/导航使用
    window.ALGOS_LIST = {{ algos | tojson }};
    {% if active_algo %}
      {% set current = (algos | selectattr('id','equalto',active_algo) | list | first) %}
      window.ALGO_PAGE_CONFIG = {id:"{{ current.id }}", title:"{{ current.name }}"};
    {% endif %}
  </script>
  <script src="/static/js/common.js"></script>
  {% if active_algo %}
    <script src="/static/js/{{ active_algo }}.js"></script>
  {% endif %}
  <script src="/static/js/algo_placeholder.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
